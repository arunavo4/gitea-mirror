name: Test Docker Build

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.dockerignore'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'src/**'
      - '.github/workflows/docker-test.yml'

jobs:
  test-build:
    name: Test Docker Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: 'arm64,amd64'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: false
          load: true
          tags: gitea-mirror:test-amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test amd64 image
        run: |
          docker run --rm gitea-mirror:test-amd64 node -e "console.log('Node.js is working on amd64')"
          
      - name: Build Docker image (arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          push: false
          tags: gitea-mirror:test-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      # We can't directly run arm64 images on GitHub's amd64 runners,
      # but we can verify that the build completes successfully
