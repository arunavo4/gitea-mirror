name: Build and Push Docker Images

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

# This workflow is a simpler version that forwards to the stable workflow
# For advanced options, use the stable workflow directly

jobs:
  forward-to-stable:
    name: Forward to Stable Workflow
    runs-on: ubuntu-latest
    steps:
      - name: Trigger stable workflow
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docker-build-stable.yml',
              ref: context.ref,
              inputs: {
                retry_mode: 'normal'
              }
            });
      
      - name: Job Summary
        run: |
          echo "# Docker Build" >> $GITHUB_STEP_SUMMARY
          echo "This workflow has forwarded the request to the more robust stable workflow." >> $GITHUB_STEP_SUMMARY
          echo "- Repository: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch/Tag: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the 'Build and Push Docker Images (Stable)' workflow for build status." >> $GITHUB_STEP_SUMMARY